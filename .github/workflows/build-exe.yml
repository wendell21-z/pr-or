name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, x86]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: >-
          python -m PyInstaller
          --onefile
          --name "pr-or${{ matrix.arch }}"
          --console
          --add-data "config.py;."
          --hidden-import ortools
          --hidden-import ortools.sat
          --hidden-import ortools.sat.python
          --hidden-import ortools.sat.python.cp_model
          --collect-all ortools
          --collect-submodules ortools
          --collect-binaries ortools
          app.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pr-or-${{ matrix.arch }}
          path: dist/pr-or${{ matrix.arch }}.exe
          retention-days: 7
