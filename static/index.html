<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排产测试工具</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        #result { white-space: pre-wrap; background: #333; color: #fff; padding: 15px; border-radius: 4px; min-height: 100px; overflow-x: auto; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h1>排产系统测试前端</h1>
    
    <div class="card">
        <h3>1. 初始化测试数据</h3>
        <p>如果数据库（内存）是空的，请先点击此按钮添加模拟数据（线体、模具、零件、库存、需求等）。</p>
        <button onclick="initData()" class="secondary">初始化模拟数据</button>
    </div>

    <div class="card">
        <h3>2. 启动求解器 (Solve/Start)</h3>
        <div class="form-group">
            <label for="lineId">线体 ID:</label>
            <input type="number" id="lineId" value="1">
        </div>
        <div class="form-group">
            <label for="beginDate">开始日期:</label>
            <input type="date" id="beginDate" value="2026-04-07">
        </div>
        <button onclick="startSolve()">启动求解</button>
    </div>

    <div class="card">
        <h3>3. 查看结果 (Solution/SolveResult)</h3>
        <button onclick="getResults()" class="secondary">查询排产结果</button>
    </div>

    <div class="card">
        <h3>运行日志 / 结果输出</h3>
        <div id="result">等待操作...</div>
    </div>

    <script>
        const API_BASE = "";

        function log(msg, isError = false) {
            const el = document.getElementById('result');
            const time = new Date().toLocaleTimeString();
            const content = `[${time}] ${msg}\n`;
            if (isError) {
                el.innerHTML += `<span class="error">${content}</span>`;
            } else {
                el.innerHTML += content;
            }
            el.scrollTop = el.scrollHeight;
        }

        async function initData() {
            log("正在初始化数据...");
            try {
                // 1. 添加工作时间
                await fetch(`${API_BASE}/fact/working-time`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: "Standard", minutes: 480})
                });

                // 2. 添加线体
                await fetch(`${API_BASE}/fact/line`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: 1, code: "Line_01", description: "Test Line 1"})
                });

                // 3. 添加模具
                await fetch(`${API_BASE}/fact/die`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: "Die_A", name: "Die A", akz: 10, lineId: 1})
                });

                // 4. 添加零件
                await fetch(`${API_BASE}/fact/part`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: "Part_1", name: "Part 1", min: 100, dieId: 1, dunnageId: 0})
                });

                // 5. 添加库存 (日期要对上)
                const dateVal = document.getElementById('beginDate').value;
                await fetch(`${API_BASE}/fact/part-inventory`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({part: "Part_1", day: dateVal, quantity: 500})
                });
                
                // 6. 需求 (简化：通过CarUsage产生)
                await fetch(`${API_BASE}/fact/car`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: "Car_X", name: "Car X"})
                });
                await fetch(`${API_BASE}/fact/part-car`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({carId: 1, partId: 1, usage: 1})
                });
                await fetch(`${API_BASE}/fact/car-usage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({carId: 1, day: dateVal, num: 100})
                });

                log("数据初始化成功 (Line 1, Die_A, Part_1, 库存500, 需求100)");
            } catch (e) {
                log("数据初始化失败: " + e.message, true);
            }
        }

        async function startSolve() {
            const lineId = parseInt(document.getElementById('lineId').value);
            const begin = document.getElementById('beginDate').value;
            
            log(`尝试启动求解器: Line ${lineId}, Date ${begin}...`);
            try {
                const resp = await fetch(`${API_BASE}/solve/start`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({lineId, begin})
                });
                const data = await resp.json();
                
                if (data.status === "COMPLETED") {
                    log(`求解成功! \n消息: ${data.message}`, false);
                } else if (data.status === "FAILED") {
                    log(`求解失败! \n原因: \n- ${data.reasons.join('\n- ')}`, true);
                } else {
                    log(`未知状态: ${JSON.stringify(data)}`, true);
                }
            } catch (e) {
                log("请求出错: " + e.message, true);
            }
        }

        async function getResults() {
            const lineId = document.getElementById('lineId').value;
            const begin = document.getElementById('beginDate').value;
            // 默认查询7天
            const end = new Date(begin);
            end.setDate(end.getDate() + 7);
            const endStr = end.toISOString().split('T')[0];

            log(`查询结果: Line ${lineId} 从 ${begin} 到 ${endStr}...`);
            try {
                const resp = await fetch(`${API_BASE}/solution/solve-result?lineId=${lineId}&begin=${begin}&end=${endStr}`);
                const data = await resp.json();
                log("排产任务列表: \n" + JSON.stringify(data.tasks, null, 2));
            } catch (e) {
                log("查询出错: " + e.message, true);
            }
        }
    </script>
</body>
</html>
